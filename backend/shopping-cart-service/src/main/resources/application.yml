server:
  port: 9080

---

spring:
  profiles:
    active: prod

# ── LOCAL profile (запуск через IDE, без Docker) ─────────────────────────────
---
spring:
  config:
    activate:
      on-profile: local
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
  datasource:
    url: jdbc:postgresql://localhost:5432/furniture_shopping_cart_db
    username: team562
    password: teamChallenge
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false

product-catalog:
  base-url: http://localhost:8080

# ── DOCKER profile (оба сервиса в docker-compose) ────────────────────────────
---
spring:
  config:
    activate:
      on-profile: docker
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
  datasource:
    url: jdbc:postgresql://shopping-cart-db:5432/furniture_shopping_cart_db
    username: team562
    password: teamChallenge
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false

product-catalog:
  base-url: http://product-catalog-service:8080

# ── PROD profile (Render + Neon) ──────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false

product-catalog:
  base-url: ${PRODUCT_CATALOG_URL}

logging:
  level:
    com.furniture_store: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE