version: "3.9"

services:
  db:
    image: postgres:16
    container_name: order-management-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  order-management:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-management
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    depends_on:
      - db
    environment:
      # Передаем переменные внутрь Spring
      SERVER_PORT: ${CONTAINER_PORT}
      POSTGRES_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env

volumes:
  postgres_data: