name: Keep Services Alive

on:
  schedule:
    # Запускати кожні 10 хвилин (формат POSIX cron)
    - cron: '*/10 * * * *'
  # Дозволяє запустити пінг вручну для перевірки
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up services
        run: |
          echo "Sending pings to Render services..."
          
          # Список ваших сервісів (замініть на реальні URL з Render)
          urls=(
            "https://online-store-562team.onrender.com/health"
            "https://online-store-562team-zezi.onrender.com/health"
            "https://order-management-service-vi3s.onrender.com/health"
          )

          for url in "${urls[@]}"; do
            echo "Pinging $url..."
            curl -s -o /dev/null -w "%{http_code}" "$url" || echo "Failed to ping $url"
            echo -e "\n"
          done
