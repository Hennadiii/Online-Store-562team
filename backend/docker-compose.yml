version: '3.8'

services:

  # ── Product Catalog Service ──────────────────────────────────────────────
  product-catalog-service:
    build:
      context: ./product-catalog-service
    container_name: product-catalog-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-catalog-db:5432/products
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      product-catalog-db:
        condition: service_healthy
    networks:
      - store-network

  product-catalog-db:
    image: postgres:15
    container_name: product-catalog-db
    environment:
      POSTGRES_DB: products
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - product_catalog_data:/var/lib/postgresql/data
    networks:
      - store-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Shopping Cart Service ────────────────────────────────────────────────
  shopping-cart-service:
    build:
      context: ./shopping-cart-service
    container_name: shopping-cart-service
    ports:
      - "9080:9080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      shopping-cart-db:
        condition: service_healthy
      product-catalog-service:
        condition: service_started
    networks:
      - store-network

  shopping-cart-db:
    image: postgres:15
    container_name: shopping-cart-db
    environment:
      POSTGRES_DB: furniture_shopping_cart_db
      POSTGRES_USER: team562
      POSTGRES_PASSWORD: teamChallenge
    ports:
      - "5433:5432"
    volumes:
      - shopping_cart_data:/var/lib/postgresql/data
    networks:
      - store-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team562 -d furniture_shopping_cart_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Order Management Service ─────────────────────────────────────────────
  order-management-service:
    build:
      context: ./order-management-service
    container_name: order-management-service
    ports:
      - "564:564"
    environment:
      SERVER_PORT: 564
      POSTGRES_URL: jdbc:postgresql://order-management-db:5432/order-management-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order-management-db
      PRODUCT_CATALOG_URL: http://product-catalog-service:8080
    depends_on:
      order-management-db:
        condition: service_healthy
      product-catalog-service:
        condition: service_started
    networks:
      - store-network

  order-management-db:
    image: postgres:15
    container_name: order-management-db
    environment:
      POSTGRES_DB: order-management-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - order_management_data:/var/lib/postgresql/data
    networks:
      - store-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order-management-db"]
      interval: 5s
      timeout: 5s
      retries: 10

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  product_catalog_data:
  shopping_cart_data:
  order_management_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  store-network:
    driver: bridge