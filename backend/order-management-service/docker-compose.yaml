
services:
  order-management:
    env_file:
      - .env
    container_name: "order-management"
    build:
      context: .
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    environment:
      SPRING_DATASOURCE_URL: "${POSTGRES_URL}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.p6spy.engine.spy.P6SpyDriver
      SPRING_JPA_PROPERTIES_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_HIBERNATE_NAMING_PHYSICAL_STRATEGY: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    depends_on:
      - db
  db:
    env_file:
      - .env
    image: "postgres:16"
    restart: always
    container_name: "order-management-service-db"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
