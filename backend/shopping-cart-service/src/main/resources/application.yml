server:
  port: 9080

---

spring:
  profiles:
    active: prod

# ── LOCAL profile ─────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: local
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
  datasource:
    url: jdbc:postgresql://localhost:5432/furniture_shopping_cart_db
    username: team562
    password: teamChallenge
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false

product-catalog:
  base-url: http://localhost:8080

# ── DOCKER profile ────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: docker
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
  datasource:
    url: jdbc:postgresql://shopping-cart-db:5432/furniture_shopping_cart_db
    username: team562
    password: teamChallenge
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    show-sql: false

product-catalog:
  base-url: http://product-catalog-service:8080

# ── PROD profile (Render + Neon) ──────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: prod
  sql:
    init:
      mode: never
      schema-locations: classpath:schema-postgres.sql
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: false

product-catalog:
  base-url: ${PRODUCT_CATALOG_URL}

logging:
  level:
    org: info
    com: off