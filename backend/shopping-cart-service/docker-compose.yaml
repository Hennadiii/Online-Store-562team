version: '3.8'

services:

  product-catalog-service:
    # Если product-catalog-service в отдельной папке — укажи путь к его Dockerfile
    # Если он уже запущен отдельно — убери этот блок и используй только network_mode
    image: product-catalog-service:latest   # или build: ../product-catalog-service
    container_name: product-catalog-service
    ports:
      - "8080:8080"
    networks:
      - store-network

  shopping-cart-service:
    container_name: shopping-cart-service
    build:
      context: .
    ports:
      - "9080:9080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - db
      - product-catalog-service
    networks:
      - store-network

  db:
    image: postgres:15
    container_name: shopping-cart-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: team562
      POSTGRES_PASSWORD: teamChallenge
      POSTGRES_DB: furniture_shopping_cart_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - store-network

volumes:
  postgres_data:

networks:
  store-network:
    driver: bridge