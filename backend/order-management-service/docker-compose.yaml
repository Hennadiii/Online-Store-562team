
services:
  order-management:
    container_name: "order-management"
    build:
      context: .
    ports:
      - "564:564"
    environment:
      - SPRING_DATASOURCE_URL=$postgres_url
      - SPRING_DATASOURCE_USERNAME=postgres_user
      - SPRING_DATASOURCE_PASSWORD=postgres_password
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.p6spy.engine.spy.P6SpyDriver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_HIBERNATE_NAMING_PHYSICAL_STRATEGY=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    depends_on:
      - db
  db:
    image: "postgres:latest"
    container_name: "order-management-service-db"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=$postgres_user
      - POSTGRES_PASSWORD=$postgres_password
      - POSTGRES_DB=$postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
